services:
  api:
    build: .
    command: uvicorn api:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    volumes:
      - ./chargers.db:/app/chargers.db
      - ./chargers.db-shm:/app/chargers.db-shm
      - ./chargers.db-wal:/app/chargers.db-wal
      - ./proxies.txt:/app/proxies.txt:ro
    environment:
      - TERM=xterm
    env_file: .env
    restart: unless-stopped

  scheduler:
    build: .
    command: python scheduler.py
    volumes:
      - ./chargers.db:/app/chargers.db
      - ./chargers.db-shm:/app/chargers.db-shm
      - ./chargers.db-wal:/app/chargers.db-wal
      - ./proxies.txt:/app/proxies.txt:ro
    environment:
      - TERM=xterm
    env_file: .env
    restart: unless-stopped
