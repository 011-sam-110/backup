services:
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ~/certs:/etc/nginx/certs:ro
    depends_on:
      - api
    restart: unless-stopped

  api:
    build: .
    command: uvicorn api:app --host 0.0.0.0 --port 8000
    ports:
      - "127.0.0.1:8000:8000"
    volumes:
      - ./chargers.db:/app/chargers.db
      - ./proxies.txt:/app/proxies.txt:ro
      - ./logs:/app/logs
      - ./bearer_token.cache:/app/bearer_token.cache
    environment:
      - TERM=xterm
    env_file: .env
    restart: unless-stopped

  scheduler:
    build: .
    command: python scheduler.py
    volumes:
      - ./chargers.db:/app/chargers.db
      - ./proxies.txt:/app/proxies.txt:ro
      - ./logs:/app/logs
      - ./bearer_token.cache:/app/bearer_token.cache
      - ./exports:/app/exports
    environment:
      - TERM=xterm
    env_file: .env
    restart: unless-stopped

  targeted-scraper:
    build: .
    command: python targeted_scraper.py
    volumes:
      - ./chargers.db:/app/chargers.db
      - ./proxies.txt:/app/proxies.txt:ro
      - ./logs:/app/logs
      - ./bearer_token.cache:/app/bearer_token.cache
    env_file: .env
    restart: unless-stopped
